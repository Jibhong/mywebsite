steps:
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - DOCKER_BUILDKIT=1
    secretEnv: ['FIREBASE_ENV']
    args:
      [
        'build',
        '--secret', 'id=firebase,env=FIREBASE_ENV',
        '-t', 'gcr.io/$PROJECT_ID/app',
        '.'
      ]

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/jibhong-website-secrets/versions/latest
      env: FIREBASE_ENV