- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      if [ -n "$$BUILD_SECRET" ]; then
        echo "BUILD_SECRET length: ${#BUILD_SECRET}"
      else
        echo "BUILD_SECRET is not set or empty"
      fi

      docker build \
        --build-arg BUILD_SECRET="$$BUILD_SECRET" \
        -t asia-southeast3-docker.pkg.dev/$PROJECT_ID/portfolio-website/jibhong-website:$COMMIT_SHA \
        .
  secretEnv: ['BUILD_SECRET']