steps:
  # 1. Create .env from Secret Manager
  - name: 'bash'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        printf "%s" "$MY_BUILD_SECRET" > .env
        cat .env
    secretEnv: ['MY_BUILD_SECRET']

  # 2. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/jibhong-website'
      - '.'

  # 3. Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/jibhong-website'

  # 4. Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'jibhong-website'
      - '--image=gcr.io/$PROJECT_ID/jibhong-website'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/jibhong-website-secret/versions/latest
      env: 'MY_BUILD_SECRET'